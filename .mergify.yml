# Mergic merge-queue test config (YAML-fidelity probe).
merge_queue:
  max_parallel_checks: 8
  dequeued_label: dequeued
queue_rules:
  # the only queue rule
  - name: default
    queue_conditions: &conds
      - base = main
    merge_conditions:
      - check-success = ci-that-never-runs
    batch_size: 2
