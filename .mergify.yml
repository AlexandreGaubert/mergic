# Minimal config for dashboard merge-queue testing.
# The queue waits on a check that never exists, so queued PRs stay
# "checking" forever and never merge. Used to test the dashboard's
# rendering of PRs queued across multiple base branches.
queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions:
      - check-success = ci-that-never-runs
merge_protections_settings:
  reporting_method: check-runs
